<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        border:1px solid red;
        position: relative;
        height: 300px;
        aspect-ratio: 1;
        /* width:fit-content; */
        transition: all .4s ease;
        background-image: url("../1image.jpg");
        background-repeat: no-repeat;
        background-size: cover;
    }
    .overlay{
       position: absolute;
       top:50%;
       left:50%;
       display:flex;
       transform: translate(-50%, -50%);
       justify-content: center;
       width:10%;
       height:100%;
       background-color: aqua;
       /* width: 0%;
       height: 100%; */
       color: aliceblue;
       opacity: 0;
       transition: all 1s ease;
    }
    .box{
        border:1px solid;
        width:70px;
        height:30px;
        margin:auto;
        color:white;
        background-color: aqua;
        display: flex;
        text-align: center;
        align-items: center;
        margin-top: 130px;
        /* align-content: center; */
        align-items: center;
     /* align-self: center; */
        transition: all 2s ease;

    }
    /* .hello{
        /* margin-left:15px; */
    } */
    .box:hover{
        width:200px;
    }
</style>
<body>
    <div class="container">
        <div class="box"><div class="hello">Hello</div></div>
        </div>
       
    </div>
</body>
</html>
