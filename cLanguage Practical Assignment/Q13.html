<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalStorage Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            border:2px solid black;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            border:2px solid rgb(0, 0, 0);
            width: 100%;
            padding: 10px;
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 4px;
            background-color: rgb(255, 255, 255);
            cursor: pointer;
            font-size: 16px;
        }
        #displayArea {
            margin-top: 20px;
            padding: 15px;
            border-left: 5px solid #ffffff;
            display: none; /* Hidden by default until data exists */
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>User Data Form</h2>
        <form id="userForm">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter Name" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter Email" required>
            <button type="submit">Save to LocalStorage</button>
        </form>
        <div id="displayArea">
            <h3>Stored Data:</h3>
            <p><strong>Name:</strong> <span id="displayName"></span></p>
            <p><strong>Email:</strong> <span id="displayEmail"></span></p>
        </div>
    </div>
    <script>
        // 1. Select DOM elements
        const form = document.getElementById('userForm');
        const displayArea = document.getElementById('displayArea');
        const displayName = document.getElementById('displayName');
        const displayEmail = document.getElementById('displayEmail');
        // 2. Function to load data from LocalStorage and show it
        function loadData() {
            const storedName = localStorage.getItem('userName');
            const storedEmail = localStorage.getItem('userEmail');
            if (storedName && storedEmail) {
                displayName.textContent = storedName;
                displayEmail.textContent = storedEmail;
                displayArea.style.display = 'block'; // Show the box
            }
        }
        // 3. Event Listener for Form Submission
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page from reloading
            // Get values from inputs
            const nameValue = document.getElementById('name').value;
            const emailValue = document.getElementById('email').value;
            // Save to LocalStorage
            localStorage.setItem('userName', nameValue);
            localStorage.setItem('userEmail', emailValue);
            // Update the display immediately
            loadData();
            // Optional: Clear the form inputs
            form.reset();
        });
        // 4. Load data immediately when the page opens
        loadData();
    </script>

</body>
</html>
