<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3d animations</title>
</head>
<style>
    .container{
        width:200px;
   height:200px;
   border:2px solid black;
   perspective: 340px;
    }
     .container div{
        width:100px;
   height:100px;
   border:2px solid black;
   margin-top:50px;
   margin-left:40px;
   /* perspective: 340px; */
   /* transform:skewy(30deg); */
   /* transform: scale3d(1.2, 1 , 1); */
   transform: translate3d(50px,20px, 30px);
    }
    .perspective-parent {
  perspective: 500px;
}
.translate3d-example1 {
  /* transform: translate3d(50px, 20px, 100px); */
  transform: scale3d(1.3, 2, .3);
  width: 100px;
  height: 100px;
  background:linear-gradient(blue,red);
  color: white;
  padding: 10px;
  /* transform: rotatez('angle'); */
}
</style>
<body>
    <div class="container">
        <div></div>
    </div>
    <div class="perspective-parent">
  <div class="translate3d-example1">Translated 50px right, 20px down, 30px forward</div>
</div>
</body>
</html>
