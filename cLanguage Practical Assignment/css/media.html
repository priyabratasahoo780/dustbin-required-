<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        border:1px solid;
        width:100vw;
        height:100vh;
        display: flex;
        justify-content: center;
        align-items: center;
       position:relative;
    }
    .box{
        width:100px;
        height:100px;
        background-color:red;
         position:absolute;
        top:50%;
        left:50%;
        transform: translate(-50%, -50%);
    }
    @media all and (max-width:600px) {
        .box{
            background-color:green;
        }
    }
</style>
<body>
    <div>
        <div class="box"></div>
    </div>
</body>
</html>
