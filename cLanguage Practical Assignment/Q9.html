<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query Demo</title>
    <style>
        /* --- GENERAL RESET --- */
        * {
            box-sizing: border-box; /* Ensures padding doesn't increase width */
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* --- 1. DESKTOP STYLES (Default) --- */
        .container {
            display: flex;          /* Makes children sit in a row */
            justify-content: space-between;
            gap: 20px;              /* Space between columns */
            padding: 40px;
            background-color: rgb(255, 255, 255); /* DESKTOP COLOR */
            min-height: 100vh;
        }

        .column {
            border:2px solid rgb(0, 0, 0);
            background-color: white;
            padding: 20px;
            flex: 1;                /* Makes all 3 columns equal width */
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* --- 2. MOBILE STYLES (Media Query) --- */
        /* Triggers when screen width is 768px or less */
        @media screen and (max-width: 768px) {
            
            .container {
                flex-direction: column;  /* Stacks children vertically */
                background-color: rgb(255, 255, 255); /* MOBILE COLOR */
            }

            .column {
                width: 100%;             /* Column takes full width */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="column">
            <h2>Column 1</h2>
            <p>This is the first column. On a wide screen, I sit on the left.</p>
        </div>
        <div class="column">
            <h2>Column 2</h2>
            <p>This is the second column. On a wide screen, I sit in the middle.</p>
        </div>
        <div class="column">
            <h2>Column 3</h2>
            <p>This is the third column. On a wide screen, I sit on the right.</p>
        </div>
    </div>

</body>
</html>
