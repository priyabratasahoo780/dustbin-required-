<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
</head>
<style>
    .box{
        border:1px solid red;
        width:100px;
        height:100px;
        border-radius:50%;
        background:radial-gradient(rgb(201, 81, 34),green,rgb(38, 38, 76),rgb(159, 27, 104),rgb(144, 9, 18),violet,orange,orangered,aqua);
        /* transition: all 2s linear; */
        animation-name:ball;
        animation-iteration-count: infinite;
        animation-direction: alternate;
        animation-duration: 10s;
        box-shadow:2px 2px 40px blue;
        animation-timing-function:linear;
        /* animation-delay: 5s; */
    }
      @keyframes ball {
        0%{
            translate:0%;
        }
        50%{
            translate:50vw 50vw;
        }
        100%{
            translate: 400px;
        }
      }
</style>
<body>
    <div class="box"></div>
</body>
</html>
