<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
</head>
<style>
    .identifiers{
        border:1px solid red;
        background-color: red;
        width:100px;
        height:100px;
        border-radius:50%;
        animation-name: identifier;
        animation-iteration-count: infinite;
    }
    @keyframes identifier {
        0%{
            transform: translatey(-180px);
        }
        30% {
            transfrom: translatey(-180px);
        }
        60%{
            transfrom: translatey(-180px);

        }   
        80%{
            transform: translateY(180px) scalex(1.2);
        } 
        100%{
            transform: translateY(180px);
        }
    }
     .animation2{
        border:1px solid red;
        height:300px;
        width:300px;
        animation-name: flip;
        animation-iteration-count: infinite;
        animation-duration: 5s;
        margin: auto;
    }
    @keyframes flip {
        0% {
            transform: rotate3d(1, -4, -2, 45deg);
            background-color: orange;
            box-shadow: 0px 10px 20px rgb(0, 0, 0, 0.3);
        }
         40% {
            transform: rotate3d(2, -1, 0, 90deg);
            background-color: orange;
            box-shadow: 0px 10px 20px rgb(0, 0, 0, 0.4);
        }
         80% {
            transform: rotate3d(1, 1, 0, 130deg);
            background:url("https://images.unsplash.com/photo-1526779259212-939e64788e3c?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8ZnJlZSUyMGltYWdlc3xlbnwwfHwwfHx8MA%3D%3D");
            box-shadow: -10px 15px 25px rgb(0, 0, 0, 0.5);
        }
         100% {
            transform: rotate3d(1, 2, 1, 130deg);
            background-color:orange;
            box-shadow: 0px 25px 35px rgb(0, 0, 0, 0.6);
        }
    }
     .container{
        
     }
     .overlay{
        position: absolute;
        top: 0;
        left: 0;
        display:flex;
        justify-content: center;
        width: 0%;
        height: 0%;
     }
    
</style>
<body>
  <div class="identifiers"></div>  
  <div class="animation2"></div>
</body>
</html>
