<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form using css</title>
</head>
<link rel="stylesheet" href="Form.css">
<body>
    <div class="main-body">
        <div class="body">
           <div><img src="color.jpg"></div>
           <div class="forms">
            <form>
                <h1>Registration info</h1>
                <label for="name">name:</label>
                <input type="text" name="name" id="name"><br><br><br><br>
                <label for="D.O.B">Date of Birth:</label>
                <input type="date" name="D.O.B" id="D.O.B"><br><br><br><br>
                <label for="gender">gender:</label>
                <select>
                   <option value="Male">Male</option>
                    <option value="Female">Female</option>
                     <option value="Nuetral">Nuetral</option>
                </select><br><br><br><br>
               <label for="email">Email:</label>
                <input type="email" name="email" id="email"><br><br><br><br>
                <label for="number">Phone:</label>
                <input type="number" name="number" id="number"><br><br><br><br>
                <button>Submit</button>
            </form>
           </div>
        </div>

    </div>
</body>
</html>
