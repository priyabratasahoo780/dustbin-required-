<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* Background Styles start */

html {
  height: 100%;
  box-sizing: border-box;
}

body {
  padding: 30px;
}

*,
*:before,
*:after {
  box-sizing: inherit;
}

.wrapper {
  background-color: gold;
  border: 3px dashed black;
  padding: 20px;
  display: flex;
  flex-wrap: wrap;
 gap:1rem;

}

div {
  border: 3px solid #333;
  background-color: #dfdfdf;
  font-size: 20px;
  flex-wrap: wrap;
}



 .a1, .a2, .a3, .a4 {
 flex-basis:22%;
 margin-bottom:10px;
}

.b1, .b2 {
  flex-basis: 48%;
 margin-bottom:10px;
}
.c1 {
  flex-basis:100%;
}

@media (min-width: 400) {

}

@media (max-width: 600px) {
   .wrapper{
    flex-direction: column;
   }

}


</style>
<body>
    <div class="wrapper">

  <div class="a1">A1</div>
  <div class="a2">A2</div>
  <div class="a3">A3</div>
  <div class="a4">A4</div>

  <div class="b1">B1</div>
  <div class="b2">B2</div>

  <div class="c1">C1</div>
  
</div>
</body>
</html>
