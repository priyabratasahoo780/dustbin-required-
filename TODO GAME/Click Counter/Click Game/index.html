<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing: border-box;
    }
    
    .bodys{
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .game{
        justify-self: center;
        margin-top: 10vh;
        border: 1px solid black;
        padding: 5vh;
        background-color: white;
        border-radius: 20px;
        box-shadow: rgba(0, 0, 0, 0.25) 0px 14px 28px, rgba(0, 0, 0, 0.22) 0px 10px 10px;
        border: none;
        z-index:200;
    }
    .container{
        justify-self: center;

    }
    .container h1{
        color: rgb(19, 202, 234);
        margin-bottom: 0;
    }
    .container p{
        color: darkgrey;
        margin-left: 3vw;
    }
    .score-section{
        /* border:1px solid red; */
        display: flex;
        align-items: center;
        justify-content: center;
        margin: auto;
        width:27vw;
        height: 6.2vw;
        display: flex;
        gap: 3vw;
    }
    .score-box{
        /* border:1px solid red; */
        padding: 10px;
        height: 6.4vw;
        width: 12vw;
        justify-items: center;
        /* background-color: rgb(166, 52, 253); */
        border-radius: 10px;
        background: linear-gradient(to bottom right, #7265e8, #ab6ce6);
    }
    .score-box h2{
        margin-bottom: 0;
        margin-top: 5px ;
        color: white;
        font-size:1.1vw;
    }
    .score{
        color: white;
        font-size: 3.2vw;
        text-shadow:1px 1px 10px rgb(255, 255, 255);
    }
    .timer-section{
        /* border: 1px solid black; */
        margin-top: 2vh;
        margin-bottom: 2vh;
        padding: 10px;
        justify-items: center;
        background-color: aliceblue;
        border-radius: 10px;
    
    }
    .timer-section h2{
       font-size: 15px;

    }
    .timer{
        font-size: 50px;
        /* color: #bd77ff; */
        background: linear-gradient(to bottom right, #6a60c0, #ad89cf);
        -webkit-background-clip: text;
         background-clip: text;
         color: transparent;

    }
    .button-section{
        display: flex;
        flex-direction: column;
    }
    #clickButton{
        height: 8vh;
        margin-bottom: 2vh;
        border-radius: 10px;
        font-size: 20px;
        font-weight: bolder;
        color:white ;
        background-color: rgb(212, 210, 210);
        transform: scale3d();
          border: none;
    }
    #startButton{
        height: 5vh;
        margin-bottom: 2vh;
         border-radius: 10px;
        background: linear-gradient(to bottom right, #7265e8, #ab6ce6);
        color: white;
        font-weight: bold; 
        border: none;
    }
    #resetButton{
          height: 4vh;
        margin-bottom: 2vh;
         border-radius: 10px;
         background: linear-gradient(to bottom right, #e88e65, #ff8b10);
         color: white;
        font-weight: bold;
          border: none;
    }
     #resumeButton{
          height: 4vh;
        margin-bottom: 2vh;
         border-radius: 10px;
         background: linear-gradient(to bottom right, #e50f0f, #5a0ff1);
         color: white;
        font-weight: bold;
          border: none;
          display:none;
    }
     #pauseButton{
          height: 4vh;
        margin-bottom: 2vh;
         border-radius: 10px;
         background: linear-gradient(to bottom right, #e86565, #4c554c);
         color: white;
        font-weight: bold;
          border: none;
    }
    .status-message{
       justify-self: center;
      font-weight: bolder;
      margin-bottom: 5vh;
      margin-top: 1vh;
    }
     .videos{
          width:100%;
          height:100%;
          position: absolute;
          z-index:-19;
          object-fit: cover;
    }
      .videos{
        display:none;
      }

      @media all and(max-width:786px) {
          .score-box{
            height:7.4vw;
          }
      }
      @media all and(max-width:600px) {
          .score-box{
            height:7.8vw;
          }
      }
   /* .gif{
      border: 1px solid red;
      width:100vw;
      height:100vh;
      overflow: hidden;
   } */
</style>
<body class="bodys">
   <!-- <video src="https://res.cloudinary.com/dv3jsenpu/video/upload/v1762105680/celebration1-video_goaets.mp4"  autoplay loop muted class="videos" ></video> -->

     <div class="game">
     <div class="container">
        <h1>Click counter game</h1>
        <p class="subtitle">Click as fast as you can!</p>
     </div>

     <div class="score-section">
        <div class="score-box">
            <h2>Current Score</h2>
            <div id="currentScore" class="score">0</div>
        </div>
        <div class="score-box">
            <h2>High Score</h2>
            <div id="highScore" class="score">0</div>
        </div>
     </div>

     <div class="timer-section">
        <h2>Time Remaining</h2>
        <div id="timer" class="timer">10</div>
     </div>

     <div class="button-section">
        <button id="clickButton" class="click-btn" disabled>Click me!</button>
        <button id="startButton" class="start-btn">
            Start game
        </button>
        <button id="resetButton" class="reset-btn">Reset high score</button>
        <!-- <button id="pauseButton" class="pause-btn">Pause Game</button>  -->
        <!-- <button id="resumeButton" class="resume-btn">Resume Game</button>  -->
    </div>
       <div id="statusMessage" class="status-message">
        Click "Start game" to begin!
     </div> 
     </div>

 <script src="index.js"></script>
</body>
</html>
