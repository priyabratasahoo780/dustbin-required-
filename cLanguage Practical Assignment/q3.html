<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Table</title>
    <style>
        table {
            width: 60%;
            border-collapse: collapse; /* Removes double borders */
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }
        /* Styling the Head */
        thead {
           
            color: rgb(0, 0, 0);
        }
        /* Styling the Footer */
        tfoot {
            background-color: #f2f2f2;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Batch</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Alice Johnson</td>
                <td>Computer Science</td>
                <td>2023</td>
                <td>85</td>
            </tr>
            <tr>
                <td>Bob Smith</td>
                <td>Data Science</td>
                <td>2024</td>
                <td>92</td>
            </tr>
            <tr>
                <td>Charlie Brown</td>
                <td>Web Development</td>
                <td>2023</td>
                <td>78</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Average Marks</td>
                <td>85</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
